version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: alertdog_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alertdog_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alertdog_network

  api:
    build: ./backend
    container_name: alertdog_api
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: alertdog_db
      DB_PORT: 3306
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./images:/app/images
      - ./frontend:/app/frontend
    depends_on:
      - db
    networks:
      - alertdog_network
    command: npm run dev

volumes:
  db_data:

networks:
  alertdog_network:
    driver: bridge
